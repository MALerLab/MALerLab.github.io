- date: "June-2025"
  content: "Deduplication of Lakh MIDI dataset got accepted for ISMIR 2025!"

- date: "March-2025"
  content: "Hannah and Seong-Uk joined as Master's student!"

- date: "Feb-2025"
  content: >-
    We won the Outstanding Young Scientist Grant by the National Research Foundation (NRF),
    securing 445 million KRW in funding over three years. Our project will develop automatic
    tokenization techniques for various folk music that cannot be fully captured by Western
    staff notation.".

- date: "Dec-2024"
  content: "ViolinDiff got accepted for ICASSP 2025!"

- date: "Nov-2024"
  content: >-
    🎉 Our paper, Six Dragons Fly Again, won the **Best Paper Award** at ISMIR 2024!!!🎉 Dasaem also won the Best Reviewer Award.

- date: "Sep-2024"
  content: >-
    We won NRF grant (Total 2B KRW for three years) for research center, me as the head
    of the center and PI. The project focuses on AI and VR application for music education,
    with seven other professors.

- date: "Jun-2024"
  content: "Two papers got accepted for ISMIR 2024!"

- date: "Mar-9-2024"
  content: "Dasaem gave a keynote talk at the conference of the Korean Society for Music Perception and Cognition (KSMPC)"

- date: "Jan-22-2024"
  content: "Danbinaerin Han received the Outstanding Paper Award for Graduate Students from Sogang University with her ISMIR paper."

- date: "Dec-14-2023"
  content: "Hyerin Kim and Danbinaerin Han successfully defended their Master's theses."

- date: "Dec-13-2023"
  content: "A collaboration with MAC Lab got accepted for ICASSP 2024."

- date: "Nov-4-2023"
  content: "Four MALer lab members participated ISMIR 2023 at Milan. We've presented two main track papers, one DLfM, one HCMIR, two LBDs."

- date: "Oct-20-2023"
  content: "Dasaem was appointed as vice president of the Korean Society for Music Perception and Cognition for 2023-2025"

- date: "Sep-2023"
  content: "We started project on re-orchestrating Korean traditional court music, funded by National Gugak Center."

- date: "Sep-6-2023"
  content: >-
    One paper got accepted to [HCMIR](https://sites.google.com/view/hcmir23/).
    Minhee Lee, an undergraduate intern in MALer lab contributed as the first author,
    collaborating with SeungHeon Doh from KAIST MAC Lab.

- date: "Sep-2-2023"
  content: >-
    One paper got accepted to [DLfM](https://dlfm.web.ox.ac.uk/).
    Danbinaerin Han and Daewoong Kim, both master's students in MALer Lab,
    contributed to this work.

- date: "Jul-20-2023"
  content: >-
    MALer Lab participated [MUSIC & AUDIO WORKSHOP 2023](https://snu-marg.notion.site/MUSIC-AUDIO-WORKSHOP-2023-3594ec77804d4c2ebfbfa6fb9d8fecc6)
    with SNU MARG, KAIST MAC, and KAIST MuBL.

- date: "Jul-12-2023"
  content: >-
    Dasaem was invited as a reviewer and committee member of thesis defense of Michael Krause,
    a PhD student from Prof. Meinard Müller's group at International Audio Laboratories Erlangen.
    After the defense, I gave research talk at AudioLabs and have discussion with Prof. Müller's
    group. Huge congratulations to Dr. Krause!

- date: "Jul-11-2023"
  content: >-
    One paper got accepted to [CMMR](https://cmmr2023.gttm.jp/).
    Hyerin Kim, a master's student in MALer Lab participated as the second author
    collaborating with Eunjin Choi from KAIST MAC Lab.

- date: "June-21-2023"
  content: >-
    Two papers got accepted to ISMIR 2023! Danbinaerin Han, a master's student in MALer Lab
    contributed as the first author, collaborating with Dr. Rafael Caro Repetto from
    Kunstuniversität Graz. Another paper was done by Pedro Ramoneda and others from UPF MTG,
    and I've participated as a co-author.

- date: "May-30-2023"
  content: "MALer Lab got accepted for Individual Research funding from National Research Foundation (NRF) of Korea for topic of Generating Gagok, Traditional Korean Lyric Song."

- date: "Mar-2023"
  content: "Three papers got accepted for domestic journals."

- date: "Feb-16-2023"
  content: "One paper has been accepted to ICASSP 2023. The work was done by KASIT MAC Lab, and I have participated as a co-author."

- date: "Feb-10-2023"
  content: "In [Ai Music Generation Challenge 2022](), our submission won first-prize award in generating Irish Reel! Our submission for sub-task 2 and 3 also beat the benchmark."
  details:
    summary: "The tweets from Prof. Dasaem Jeong"
    html: |
      <blockquote class="twitter-tweet"><p lang="en" dir="ltr">Got the First prize from AI Music Generation Challenge 2022 tune generation🥳 The task was to generate traditional Irish Reel dance music (monophonic melody in symbolic), and one of our generated tunes got the perfect scores from all of the four human expert judges😎 <a href="https://t.co/eQb91Nb0ui">pic.twitter.com/eQb91Nb0ui</a></p>&mdash; Dasaem Jeong (@DasaemJ) <a href="https://twitter.com/DasaemJ/status/1624393341529128961?ref_src=twsrc%5Etfw">February 11, 2023</a></blockquote> <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

- date: "Feb-3-2023"
  content: >-
    Jiin An, an intern at MALer Lab, has won excellence award in HCI Korea 2023 Creative Award track.
    The work had been started as a term project of AAT3020, Natural Language Processing course
    given by Dasaem Jeong.
