- date: "June-30-2022"
  content: >-
    One paper got accepted for ACM Multimedia as a second author. It was joint research with
    Pedro Ramoneda, Marius Miron, and Xavier Serra from Music Technology Group, Universitat
    Pompeu Fabra, and Eita Nakamura from Kyoto University.

- date: "June 2022"
  content: >-
    We got accepted for two fundings: 1) Individual Research funding from National Research
    Foundation (NRF) of Korea for topic of Expressive Performance Modeling, and 2) Dataset
    composition for acoustic scene and sound from NIA, with NeuTune and KAIST MAC Lab.
