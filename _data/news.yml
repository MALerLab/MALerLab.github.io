- date: "Jan 2023"
  content: "Dasaem will serve as an area chair of ICML 2023."

- date: "Dec 2022"
  content: >-
    MALer Lab participated ISMIR 2022. Danbinaerin Han, a Master's student, performed
    Fantastic AI Sinawi with 해금Haegeum during the Music Program. Total seven people
    participated from Sogang University, which was the largest group among entire East Asia!
